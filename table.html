<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Table in AR</title>
  
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <link href="style.css" rel="stylesheet" />
</head>
<body>
   
  <div class="card">
    <h2>View Table in AR</h2>
    <model-viewer 
        src="litewall_counter_table.glb" 
        ios-src="litewall_counter_table.usdz" 
        alt="3D Modern Table" 
        ar 
        auto-rotate 
        camera-controls>
    </model-viewer>
  </div>
  <div class="card">
    <h2>View Table in AR</h2>
    <model-viewer 
        src="table2.glb" 
        ios-src="table2.usdz" 
        alt="3D Table" 
        ar 
        auto-rotate 
        camera-controls>
    </model-viewer>
  </div>
  
  <div class="card">
    <h2>View Table in AR</h2>
    <model-viewer 
        src="classic_dinning_table.glb" 
        ios-src="classic_dinning_table.usdz" 
        alt="3D Table" 
        ar 
        auto-rotate 
        camera-controls>
    </model-viewer>
  </div>
  <div class="card">
    <h2>View Table in AR</h2>
    <model-viewer 
        src="side_table.glb" 
        ios-src="side_table.usdz" 
        alt="3D Table" 
        ar 
        auto-rotate 
        camera-controls>
    </model-viewer>
  </div>
  <div class="card">
    <h2>View Table in AR</h2>
    <model-viewer 
        src="mahogany_table.glb" 
        ios-src="mahogany_table.glb.usdz" 
        alt="3D Table" 
        ar 
        auto-rotate 
        camera-controls>
    </model-viewer>
  </div>
  
</body>
</html>
