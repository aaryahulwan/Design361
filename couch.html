<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Couch in AR</title>
  
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <link href="style.css" rel="stylesheet" />
</head>
<body>
   
  <div class="card">
    <h2>View Couch in AR</h2>
    <model-viewer 
        src="sofa.glb" 
        ios-src="sofa.usdz" 
        alt="3D Modern Couch" 
        ar 
        auto-rotate 
        camera-controls>
    </model-viewer>
  </div>
  <div class="card">
    <h2>View Couch in AR</h2>
    <model-viewer 
        src="sofa2.glb" 
        ios-src="sofa2.usdz"

        ar 
        auto-rotate 
        camera-controls>
    </model-viewer>
  </div>
  
  <div class="card">

        src="sofa_-_classic_furniture_set..glb"

        ar

  </div>
  <div class="card">

        auto-rotate 
        camera-controls>
    </model-viewer>
  </div>
  
</body>
</html>
