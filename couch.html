<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Couch in AR</title>
  
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <link href="style.css" rel="stylesheet" />
</head>
<body>
   
  <div class="card">
    <h2>View Couch in AR</h2>
    <model-viewer 
        src="couch1.glb" 
        ios-src="couch1.usdz" 
        alt="3D Modern Couch" 
        ar 
        auto-rotate 
        camera-controls>
    </model-viewer>
  </div>

</html>
