<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Chair in AR</title>
  
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <link href="style.css" rel="stylesheet" />
</head>
<body>
   
  <div class="card">
    <h2>View Chair in AR</h2>
    <model-viewer 
        src="modern_chair.glb" 
        ios-src="modern_chair.usdz" 
        alt="3D Modern Chair" 
        ar 
        auto-rotate 
        camera-controls>
    </model-viewer>
  </div>
  <div class="card">
    <h2>View Chair in AR</h2>
    <model-viewer 
        src="armchair.glb" 
        ios-src="armchair.usdz" 
        alt="3D ArmChair" 
        ar 
        auto-rotate 
        camera-controls>
    </model-viewer>
  </div>
  
  <div class="card">
    <h2>View Chair in AR</h2>
    <model-viewer 
        src="chair1.glb" 
        ios-src="chair1.usdz" 
        alt="3D Chair" 
        ar 
        auto-rotate 
        camera-controls>
    </model-viewer>
  </div>
  <div class="card">
    <h2>View Chair in AR</h2>
    <model-viewer 
        src="classic_chair.glb" 
        ios-src="classic_chair.usdz" 
        alt="3D Classic chair" 
        ar 
        auto-rotate 
        camera-controls>
    </model-viewer>
  </div>
  <div class="card">
    <h2>View Chair in AR</h2>
    <model-viewer 
        src="old_chair.glb" 
        ios-src="old_chair.usdz" 
        alt="3D Chair" 
        ar 
        auto-rotate 
        camera-controls>
    </model-viewer>
  </div>
  
</body>
</html>
