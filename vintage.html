<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Vintage Theme in AR</title>
  
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <link href="style.css" rel="stylesheet" />
</head>
<body>
   
  <div class="card">
    <h2>View Living Room in AR</h2>
    <model-viewer 
        src="corona_interior_baking.glb" 
        ios-src="corona_interior_baking.usdz" 
        alt="3D Living Room" 
        ar 
        auto-rotate 
        camera-controls>
    </model-viewer>
  </div>
  <div class="card">
    <h2>View Bedroom in AR</h2>
    <model-viewer 
        src="vintage_office_-_interior_scene.glb" 
        ios-src="vintage_office_-_interior_scene.usdz" 
        alt="3D Bedroom" 
        ar 
        auto-rotate 
        camera-controls>
    </model-viewer>
  </div>
  <div class="card">
    <h2>View Kitchen in AR</h2>
    <model-viewer 
        src="mirrors_edge_apartment_-_interior_scene.glb" 
        ios-src="mirrors_edge_apartment_-_interior_scene.usdz" 
        alt="3D kitchen" 
        ar 
        auto-rotate 
        camera-controls>
    </model-viewer>
  </div>
  <div class="card">
    <h2>View Bedroom in AR</h2>
    <model-viewer 
        src="the_great_drawing_room.glb" 
        ios-src="the_great_drawing_room.usdz" 
        alt="3D Bedroom" 
        ar 
        auto-rotate 
        camera-controls>
    </model-viewer>
  </div>
  <div class="card">
    <h2>View Restroom in AR</h2>
    <model-viewer 
        src="bathroom_interior.glb" 
        ios-src="bathroom_interior.usdz" 
        alt="3D Restroom" 
        ar 
        auto-rotate 
        camera-controls>
    </model-viewer>
  </div>

</body>
</html>
