<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Classic Theme in AR</title>
  
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <link href="style.css" rel="stylesheet" />
</head>
<body>
   
  <div class="card">
    <h2>View Living Room in AR</h2>
    <model-viewer 
        src="cozy_living_room_baked (1).glb" 
        ios-src="cozy_living_room_baked (1).usdz" 
        alt="3D Living Room" 
        ar 
        auto-rotate 
        camera-controls>
    </model-viewer>
  </div>
  <div class="card">
    <h2>View Bedroom in AR</h2>
    <model-viewer 
        src="classicbedroom.glb" 
        ios-src="classicbedroom.usdz" 
        alt="3D Bedroom" 
        ar 
        auto-rotate 
        camera-controls>
    </model-viewer>
  </div>
  <div class="card">
    <h2>View Kitchen in AR</h2>
    <model-viewer 
        src="marias_kitchen_dynamic_3d.glb" 
        ios-src="marias_kitchen_dynamic_3d.usdz" 
        alt="3D kitchen" 
        ar 
        auto-rotate 
        camera-controls>
    </model-viewer>
  </div>
  <div class="card">
    <h2>View Bedroom in AR</h2>
    <model-viewer 
        src="tropical_bedroom.glb" 
        ios-src="tropical_bedroom.usdz" 
        alt="3D Bedroom" 
        ar 
        auto-rotate 
        camera-controls>
    </model-viewer>
  </div>
  <div class="card">
    <h2>View Restroom in AR</h2>
    <model-viewer 
        src="sample_restroom.glb" 
        ios-src="sample_restroom.usdz" 
        alt="3D Restroom" 
        ar 
        auto-rotate 
        camera-controls>
    </model-viewer>
  </div>

</body>
</html>
